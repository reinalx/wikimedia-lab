server:
  address: 0.0.0.0
  port: 8080

spring:
  application:
    name: transform-wikimedia
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      enable-auto-commit: false
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID}
      auto-offset-reset: ${SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        specific.avro.reader: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      acks: all
      retries: 2147483647
      transaction-id-prefix: wikimedia-processor-tx-
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    properties:
      schema.registry.url: ${SPRING_KAFKA_PROPERTIES_SCHEMA_REGISTRY_URL:http://schema-registry:8081}

app:
  kafka:
    topics:
      raw: ${APP_KAFKA_TOPICS_RAW}
      filtered: ${APP_KAFKA_TOPICS_FILTERED}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    defaults:
      enabled: true

logging:
  level:
    com.learn: DEBUG
    org.springframework.kafka: INFO
