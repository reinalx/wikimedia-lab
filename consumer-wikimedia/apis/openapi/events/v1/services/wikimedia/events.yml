get:
  tags:
    - Events
  summary: Retrieves a list of wikimedia events
  description: Retrieves a list of wikimedia events from Wikimedia EventStreams
  operationId: getWikimediaEvents
  parameters:
    - $ref: '../../components/wikimedia/components.yml#/components/parameters/GetWikimediaEventsRequestPage'
    - $ref: '../../components/wikimedia/components.yml#/components/parameters/GetWikimediaEventsRequestSize'
  responses:
    "200":
      description: Ok
      content:
        application/json:
          schema:
            $ref: "../../components/wikimedia/components.yml#/components/schemas/GetWikimediaEventsResponse"
    '400':
      $ref: '../../components/errors/components.yml#/components/responses/BadRequest'
    '401':
      $ref: '../../components/errors/components.yml#/components/responses/Unauthorized'
    '403':
      $ref: '../../components/errors/components.yml#/components/responses/Forbidden'
    "404":
      $ref: '../../components/errors/components.yml#/components/responses/NotFound'
    '500':
      $ref: '../../components/errors/components.yml#/components/responses/InternalServerError'