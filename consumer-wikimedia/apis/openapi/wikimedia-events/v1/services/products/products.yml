get:
  tags:
    - Products
  summary: Retrieves a list products
  description: Retrieves a list of products available in the system
  operationId: getProducts
  parameters:
    - $ref: '../../components/products/components.yml#/components/parameters/GetProductsRequestProductName'
  responses:
    "200":
      description: Ok
      content:
        application/json:
          schema:
            $ref: "../../components/products/components.yml#/components/schemas/GetProductsResponse"
    '400':
      $ref: '../../components/errors/components.yml#/components/responses/BadRequest'
    '401':
      $ref: '../../components/errors/components.yml#/components/responses/Unauthorized'
    '403':
      $ref: '../../components/errors/components.yml#/components/responses/Forbidden'
    "404":
      $ref: '../../components/errors/components.yml#/components/responses/NotFound'
    '500':
      $ref: '../../components/errors/components.yml#/components/responses/InternalServerError'