components:
  schemas:
    GetProductsResponse:
      type: object
      properties:
        products:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/Product'
      required:
        - products
    Product:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the product
          minimum: 1
          example: 1
        name:
          type: string
          description: Name of the product
          minLength: 2
          maxLength: 100
          example: "Sample Product"
        description:
          type: string
          description: Description of the product
          minLength: 10
          maxLength: 500
          example: "This is a sample product."
        price:
          type: number
          format: float
          description: Price of the product
          minimum: 0.0
          maximum: 10000.0
          example: 19.99
      required:
        - id
        - name
        - price
  parameters:
    GetProductsRequestProductName:
      name: productName
      in: query
      description: Filter products by name
      required: false
      schema:
        type: string
        maxLength: 100
        example: "Sample Product"