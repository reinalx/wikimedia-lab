openapi: 3.0.3

info:
  title: Users API
  description: Provides endpoints that allow users to manage user information within the system
  contact:
    name: Proactive Devs team
    email: proactivedevs@gmail.com
    url: 'http://proactivedevs.com'
  version: 0.0.1

servers:
  - url: http://localhost:8080/smartopswsc
    description: Localhost
  - url: https://proactivedevs-template-des/smartopswsc
    description: DES
  - url: https://proactivedevs-template-pre/smartopswsc
    description: PRE
  - url: https://proactivedevs-template-prod/smartopswsc
    description: PRO

tags:
  - name: Users
    description: Operations about Users management

security:
  - itxBasicAuth: []
  - itxBearerAuth: []

paths:
  /v1/users:
    $ref: './v1/services/users/users.yml'

components:
  securitySchemes:
    itxBasicAuth:
      type: http
      scheme: basic
    itxBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
