post:
  tags:
    - Users
  summary: Create a new user
  description: Creates a new user in the system with the provided user information
  operationId: createUser
  requestBody:
    description: User data for creating a new user
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/users/components.yml#/components/schemas/CreateUserRequest'
        example:
          name: "John Doe"
          email: "john.doe@example.com"
          age: 30
          phoneNumber: "+1234567890"
  responses:
    "201":
      description: User created successfully
      content:
        application/json:
          schema:
            $ref: "../../components/users/components.yml#/components/schemas/CreateUserResponse"
          example:
            id: "123e4567-e89b-12d3-a456-426614174000"
            name: "John Doe"
            email: "john.doe@example.com"
            age: 30
            phoneNumber: "+1234567890"
            createdAt: "2024-01-15T10:30:00Z"
            isActive: true
    '400':
      $ref: '../../components/errors/components.yml#/components/responses/BadRequest'
    '401':
      $ref: '../../components/errors/components.yml#/components/responses/Unauthorized'
    '403':
      $ref: '../../components/errors/components.yml#/components/responses/Forbidden'
    '409':
      $ref: '../../components/errors/components.yml#/components/responses/Conflict'
    '500':
      $ref: '../../components/errors/components.yml#/components/responses/InternalServerError'
